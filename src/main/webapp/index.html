<!DOCTYPE html>
<html>
<head>
<title>Student Information System</title>

<style>

body{
    margin:0;
    padding:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(to right,#74ebd5,#ACB6E5);
}

.container{
    width:400px;
    margin:80px auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0px 0px 15px gray;
}

h1{
    text-align:center;
    color:#333;
    margin-bottom:25px;
}

label{
    font-weight:bold;
    display:block;
    margin-top:10px;
}

input[type=text]{
    width:100%;
    padding:10px;
    margin-top:5px;
    border:1px solid #ccc;
    border-radius:8px;
}

input[type=submit]{
    width:100%;
    padding:12px;
    margin-top:20px;
    background:#4CAF50;
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}

input[type=submit]:hover{
    background:#45a049;
}

</style>
</head>

<body>

<div class="container">

<h1>Student Information System</h1>

<form action="StudentServlet" method="post">

<label>Roll No</label>
<input type="text" name="rollno" required>

<label>Name</label>
<input type="text" name="name" required>

<label>Course</label>
<input type="text" name="course" required>

<label>City</label>
<input type="text" name="city" required>

<input type="submit" value="Save Record">

</form>

</div>

</body>
</html>
