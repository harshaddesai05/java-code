<!DOCTYPE html>
<html>
<head>
<title>Movie Booking</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(to right,#141E30,#243B55);
}

.box{
width:350px;
margin:120px auto;
background:white;
padding:30px;
border-radius:15px;
text-align:center;
box-shadow:0 0 15px gray;
}

input[type=text],select{
width:90%;
padding:10px;
margin:10px;
border-radius:8px;
border:1px solid gray;
}

input[type=submit]{
width:95%;
padding:12px;
background:#ff4b2b;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

input[type=submit]:hover{
background:#ff416c;
}
</style>
</head>

<body>

<div class="box">
<h1> Movie Booking</h1>

<form action="LoginServlet" method="post">

<input type="text" name="uname" placeholder="Enter Name" required>

<input type="submit" value="Login">

</form>
</div>

</body>
</html>
